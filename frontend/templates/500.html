<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 - Internal Server Error</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      background: var(--bg-primary, #F8FAFC);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .error-container {
      text-align: center;
      padding: 40px;
      background: var(--bg-card, #ffffff);
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-color, #E2E8F0);
      max-width: 440px;
      width: 100%;
    }
    .error-icon {
      font-size: 64px;
      color: #EF4444;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary, #0F172A);
      margin-bottom: 12px;
    }
    p {
      color: var(--text-secondary, #64748B);
      font-size: 16px;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      background: #4F46E5;
      color: white;
      font-weight: 500;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #4338CA;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
    <h1>500 - Server Error</h1>
    <p>Something went wrong on our end. We are looking into it. Please try again in a few moments.</p>
    <a href="/home" class="btn" style="color: white;"><i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Return to Dashboard</a>
  </div>
</body>
</html>
