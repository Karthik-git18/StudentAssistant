<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Assistant - Register</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body style="background: linear-gradient(135deg, #F8FAFC 0%, #EEF2FF 100%);">
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo" style="justify-content: center; margin-bottom: 16px;">
          <i class="fas fa-brain"></i> Student AI
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join Student Assistant today</p>
      </div>

      <form method="post" action="/register" class="auth-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-input" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>

        <div class="form-group">
          <label class="form-label">Roll Number</label>
          <input type="text" name="roll" class="form-input" placeholder="e.g., 23BCS001">
        </div>

        <div class="form-group">
          <label class="form-label">Branch</label>
          <input type="text" name="branch" class="form-input" placeholder="e.g., Computer Science">
        </div>

        <div class="form-group">
          <label class="form-label">Semester</label>
          <input type="text" name="semester" class="form-input" placeholder="e.g., 6">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
          Create Account
        </button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>
</body>
</html>
